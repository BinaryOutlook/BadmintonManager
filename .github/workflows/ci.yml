name: CI Demo

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, domain coverage, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run domain coverage gate
        run: npm run test:coverage

      - name: Build production bundle
        run: npm run build
